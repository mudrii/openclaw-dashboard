name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-go:
    name: Go tests & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run Go tests with race detection and coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Show coverage summary
        run: go tool cover -func=coverage.out

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test-python:
    name: Python test suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run static analysis tests (no server needed)
        run: python -m pytest tests/test_frontend.py tests/test_dockerfile.py tests/test_nix_flake.py tests/test_system_metrics.py -v

      - name: Run schema tests
        run: python -m pytest tests/test_data_schema.py -v
        continue-on-error: true
        # data.json only exists after refresh.sh runs against a real OpenClaw install

      - name: Run server integration tests
        run: python -m pytest tests/test_server.py tests/test_chat.py tests/test_hierarchy_recent.py tests/test_critical.py -v

  lint-shell:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Check refresh.sh
        run: shellcheck --severity=warning refresh.sh

      - name: Check install.sh
        run: shellcheck --severity=warning install.sh || true

      - name: Check uninstall.sh
        run: shellcheck --severity=warning uninstall.sh || true
