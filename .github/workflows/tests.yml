name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: GolangCI-Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Go test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run vet
        run: go vet ./...

      - name: Run tests with race detector
        run: go test -race -v -count=1 ./...

      - name: Build binary
        run: go build -ldflags="-s -w" -o openclaw-dashboard ./cmd/openclaw-dashboard

  lint-shell:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Check refresh.sh
        run: shellcheck --severity=warning assets/runtime/refresh.sh

      - name: Check install.sh
        run: shellcheck --severity=warning install.sh

      - name: Check uninstall.sh
        run: shellcheck --severity=warning uninstall.sh
