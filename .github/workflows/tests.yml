name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Go test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run vet
        run: go vet ./...

      - name: Run tests with race detector
        run: go test -race -v -count=1 ./...

      - name: Build binary
        run: go build -ldflags="-s -w" -o openclaw-dashboard .

  lint-shell:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Check refresh.sh
        run: shellcheck --severity=warning refresh.sh

      - name: Check install.sh
        run: shellcheck --severity=warning install.sh || true

      - name: Check uninstall.sh
        run: shellcheck --severity=warning uninstall.sh || true
